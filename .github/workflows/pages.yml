name: Preview GitHub Pages

# Preview statique, lecture seule, pour visualiser le design.
# L'application complète (uploads audio/vidéo, écriture) tourne sur
# serveur Node/Express — voir server.js et run.sh.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r public/. _site/
          mkdir -p _site/data
          cp data/places.json _site/data/places.json
          # Pas d'uploads/ : les médias lourds vivent sur le serveur, pas sur Pages.

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
