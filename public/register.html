<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — Mémoire des Cévennes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/legal.css" />
  <style>
    body { overflow: auto; }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
    }
    .auth-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem 2.2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
    }
    .auth-card h2 {
      margin: 0 0 1.4rem;
      font-size: 1.35rem;
      color: var(--accent-dark);
    }
    .auth-card label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .auth-card input[type="email"],
    .auth-card input[type="password"],
    .auth-card input[type="text"] {
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      background: #fff;
      color: var(--fg);
    }
    .auth-card input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .auth-card .actions {
      margin-top: 1.2rem;
    }
    .auth-error {
      background: #fde8e8;
      color: #8b1a1a;
      border: 1px solid #f5c6c6;
      border-radius: 4px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .auth-success {
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #c8e6c9;
      border-radius: 4px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .auth-switch {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }
    .auth-switch a {
      color: var(--accent);
    }
    .consent-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--fg);
    }
    .consent-row input[type="checkbox"] {
      margin-top: 0.2rem;
      flex-shrink: 0;
      width: 1rem;
      height: 1rem;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-titles">
      <h1><a href="index.html" style="color:inherit;text-decoration:none">Mémoire des Cévennes</a></h1>
      <p class="tagline">Une carte pour recueillir les récits, les voix et les images de nos vallées.</p>
    </div>
    <div class="topbar-actions">
      <a href="index.html" class="btn-ghost">← Retour à la carte</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h2>Créer un compte</h2>
      <div id="auth-error" class="auth-error" hidden></div>
      <div id="auth-success" class="auth-success" hidden></div>
      <form id="form-register" novalidate>
        <label>Votre nom
          <input type="text" name="name" required autocomplete="name" placeholder="Prénom Nom" />
        </label>
        <label>Adresse e-mail
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>Mot de passe
          <input type="password" name="password" required autocomplete="new-password" minlength="8" />
          <span class="hint">8 caractères minimum.</span>
        </label>
        <div class="consent-row">
          <input type="checkbox" id="consent" name="consentGiven" required />
          <label for="consent" style="flex-direction:row;margin-bottom:0;">
            J'ai lu et j'accepte la <a href="legal/charte-contributeur.html" target="_blank" rel="noopener">charte du contributeur</a>
            et la <a href="legal/confidentialite.html" target="_blank" rel="noopener">politique de confidentialité</a>.
          </label>
        </div>
        <div class="actions">
          <button type="submit" class="btn-primary">S'inscrire</button>
        </div>
      </form>
      <p class="auth-switch">Déjà inscrit·e ? <a href="login.html">Se connecter</a></p>
    </div>
  </main>

  <footer class="site-footer" style="position: static;">
    <a href="legal/mentions.html">Mentions légales</a>
    <span class="sep">·</span>
    <a href="legal/confidentialite.html">Confidentialité</a>
    <span class="sep">·</span>
    <a href="legal/charte-contributeur.html">Charte</a>
    <span class="sep">·</span>
    <a href="signaler.html">Signaler</a>
  </footer>

  <script>
    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('auth-error');
      const okEl  = document.getElementById('auth-success');
      errEl.hidden = true;
      okEl.hidden  = true;

      const fd = new FormData(e.target);
      const consentGiven = fd.get('consentGiven') === 'on';

      if (!consentGiven) {
        errEl.textContent = 'Vous devez accepter les conditions pour vous inscrire.';
        errEl.hidden = false;
        return;
      }

      const data = {
        name:  fd.get('name'),
        email: fd.get('email'),
        password: fd.get('password'),
        consentGiven: true
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          credentials: 'same-origin'
        });
        const json = await res.json();
        if (!res.ok) {
          errEl.textContent = json.error || 'Erreur lors de l\'inscription.';
          errEl.hidden = false;
          return;
        }
        okEl.textContent = 'Compte créé ! Votre accès sera activé après validation par un administrateur. Vous recevrez une confirmation par e-mail.';
        okEl.hidden = false;
        e.target.reset();
      } catch {
        errEl.textContent = 'Impossible de joindre le serveur.';
        errEl.hidden = false;
      }
    });
  </script>
</body>
</html>
